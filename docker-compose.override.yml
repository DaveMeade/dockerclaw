name: ${COMPOSE_PROJECT_NAME}

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw:local

    # run as root
    user: "0:0"

    # sane container hardening limits
    pids_limit: 512
    ulimits:
      nofile: 1048576

    # override upstream bind mounts with named volumes
    volumes:
      - openclaw_data:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    environment:
      OPENCLAW_ALLOWED_ORIGINS: ${OPENCLAW_ALLOWED_ORIGINS}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

    # allow initial startup without config (needed for reset/onboard flow)
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND}",
        "--port",
        "18789",
        "--allow-unconfigured"
      ]

  dockerclaw-cli:
      image: ${OPENCLAW_IMAGE:-openclaw:local}    
      # Standard networking so it's a real project member
      networks:
        - default
      # Root for volume permission consistency
      user: "0:0"
      cap_drop:
        - NET_RAW
        - NET_ADMIN
      security_opt:
        - no-new-privileges:true
      environment:
        HOME: /home/node
        TERM: xterm-256color
        # Direct CLI to the gateway's DNS name instead of loopback
        OPENCLAW_GATEWAY_URL: ws://openclaw-gateway:18789
        OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
        OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
        BROWSER: echo
      volumes:
        - openclaw_data:/home/node/.openclaw
        - openclaw_workspace:/home/node/.openclaw/workspace
      stdin_open: true
      tty: true
      init: true
      entrypoint: ["node", "dist/index.js"]


